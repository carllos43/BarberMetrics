kind = "web"
previewPath = "/"
title = "BarberMetrics"
version = "1.0.0"
id = "artifacts/barber-metrics"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22962

[services.development]
run = "pnpm --filter @workspace/barber-metrics run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/barber-metrics", "run", "build" ]
publicDir = "artifacts/barber-metrics/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22962"
BASE_PATH = "/"
